name: Playwright E2E Tests (Scheduled)

on:
  schedule:
    # Every other day at 06:00 UTC (08:00 CET)
    - cron: '0 6 */2 * *'
  workflow_dispatch:

jobs:
  playwright-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASIC_AUTH_USER: ${{ secrets.CYPRESS_BASIC_AUTH_USER }}
          BASIC_AUTH_PASS: ${{ secrets.CYPRESS_BASIC_AUTH_PASS }}
          TEST_USER_EMAIL: ${{ secrets.CYPRESS_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.CYPRESS_TEST_USER_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
